<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktørkart - Roller og ansvar i KI-støttet verdikjede</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #333;
            line-height: 1.5;
        }
        header {
            background: #003366;
            color: #fff;
            padding: 24px 32px;
            text-align: center;
        }
        header h1 { font-size: 1.6rem; margin-bottom: 6px; }
        header p { font-size: 0.95rem; opacity: 0.9; }
        .source-ref {
            text-align: center;
            padding: 12px 32px;
            background: #f0f4f8;
            color: #555;
            font-size: 0.85rem;
            border-bottom: 1px solid #ddd;
        }
        .legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 16px 32px;
            background: #fafafa;
            border-bottom: 1px solid #eee;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #333;
        }
        .legend-swatch {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 1px solid rgba(0,0,0,0.15);
        }
        .canvas-container {
            display: flex;
            justify-content: center;
            padding: 20px;
            overflow-x: auto;
        }
        canvas {
            display: block;
            cursor: default;
        }
        .tooltip {
            position: fixed;
            background: #1a1a2e;
            color: #f0f0f0;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            max-width: 300px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 100;
            line-height: 1.6;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .tooltip strong { color: #fff; }
        footer {
            text-align: center;
            padding: 16px;
            font-size: 0.8rem;
            color: #888;
            border-top: 1px solid #eee;
        }
        @media print {
            header { background: #003366 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .tooltip { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Roller og ansvar i den KI-støttede verdikjeden</h1>
        <p>Organisasjonskart over aktører, roller og relasjoner</p>
    </header>
    <div class="source-ref">Basert på Delrapport 4: Alternativer for ny verdikjede for kunnskapsforvaltning, seksjon 6.1</div>
    <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#7B2D8E;"></div> Oppdragsgiver</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#003366;"></div> Governance</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#1A7A3A;"></div> Produksjon</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#C75000;"></div> Drift</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#2E6B9E;"></div> Validering / Konsument</div>
    </div>
    <div class="canvas-container">
        <canvas id="chart"></canvas>
    </div>
    <div class="tooltip" id="tooltip"></div>
    <footer>Sist oppdatert: 2026-03-15</footer>

<script>
(function() {
    const DPR = window.devicePixelRatio || 1;
    const W = 1100, H = 780;
    const canvas = document.getElementById('chart');
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);

    const COLORS = {
        oppdragsgiver: '#7B2D8E',
        governance:    '#003366',
        produksjon:    '#1A7A3A',
        drift:         '#C75000',
        konsument:     '#2E6B9E'
    };

    const actors = [
        {
            id: 'hod',
            label: 'HOD',
            subtitle: 'Oppdragsgiver',
            color: COLORS.oppdragsgiver,
            x: 550, y: 60, w: 220, h: 90,
            bullets: ['Politisk styring', 'Finansiering', 'Oppdrag til Helsedirektoratet'],
            tooltip: 'Helse- og omsorgsdepartementet gir oppdrag, politisk styring og finansiering for KI-støttet kunnskapsforvaltning.'
        },
        {
            id: 'hdir',
            label: 'Helsedirektoratet',
            subtitle: 'Overordnet governance',
            color: COLORS.governance,
            x: 550, y: 210, w: 220, h: 90,
            bullets: ['Standarder og kvalitetskrav for KI-bruk', 'Kvalitetsrammeverk for KI-innhold', 'Godkjenning av KI-verktøy', 'EU AI Act / EHDS-samsvar'],
            tooltip: 'Fastsetter standarder, kvalitetskrav og retningslinjer for KI-bruk. Eier kvalitetsrammeverket og sikrer regulatorisk samsvar.'
        },
        {
            id: 'fhi',
            label: 'FHI',
            subtitle: 'KI-støttet kunnskapssyntese',
            color: COLORS.produksjon,
            x: 260, y: 390, w: 220, h: 90,
            bullets: ['KI-verktøy for screening og oppsummering', 'Faglig validering av KI-innhold', 'Metodeutvikling for KI-støttet oversiktsarbeid'],
            tooltip: 'Implementerer KI-verktøy for forskningsscreening og kunnskapsoppsummering. Validerer KI-generert innhold faglig og utvikler metodikk.'
        },
        {
            id: 'nhn',
            label: 'NHN',
            subtitle: 'Drift av KI-infrastruktur',
            color: COLORS.drift,
            x: 550, y: 390, w: 220, h: 90,
            bullets: ['Teknisk KI-infrastruktur', 'Chatbot-løsninger på helsenorge.no', 'Oppetid, ytelse, sikkerhet'],
            tooltip: 'Drifter og forvalter teknisk KI-infrastruktur, inkludert chatbot på helsenorge.no. Sikrer oppetid, ytelse og sikkerhet.'
        },
        {
            id: 'rhf',
            label: 'Fageksperter (RHF-er)',
            subtitle: 'Validering',
            color: COLORS.konsument,
            x: 840, y: 390, w: 220, h: 90,
            bullets: ['Validering av retningslinjeutkast', 'Klinisk ekspertise', 'Tilbakemelding fra praksis'],
            tooltip: 'Deltar i validering av KI-genererte retningslinjeutkast, bidrar med klinisk ekspertise og melder tilbake fra praksis.'
        },
        {
            id: 'ks',
            label: 'KS / Kommuner',
            subtitle: 'Implementering',
            color: COLORS.konsument,
            x: 260, y: 580, w: 220, h: 90,
            bullets: ['Kommunal helsetjeneste', 'Lokal tilpasning av retningslinjer'],
            tooltip: 'Legger til rette for at kommunale helse- og omsorgstjenester tar i bruk KI-støttet kunnskap. Tilpasser retningslinjer lokalt.'
        },
        {
            id: 'innbygger',
            label: 'Innbyggerpanel',
            subtitle: 'Brukermedvirkning',
            color: COLORS.konsument,
            x: 550, y: 580, w: 220, h: 90,
            bullets: ['Representere innbyggerperspektivet', 'Tilbakemelding på forståelighet'],
            tooltip: 'Representerer innbyggerperspektivet. Gir tilbakemelding på forståelighet, relevans og tilgjengelighet av helseinformasjon.'
        }
    ];

    const relations = [
        { from: 'hod', to: 'hdir', label: 'Oppdrag og finansiering', type: 'down' },
        { from: 'hdir', to: 'fhi', label: 'Standarder og kvalitetskrav', type: 'down-left' },
        { from: 'hdir', to: 'nhn', label: 'Arkitekturkrav', type: 'down' },
        { from: 'hdir', to: 'rhf', label: 'Retningslinjer for KI-bruk', type: 'down-right' },
        { from: 'fhi', to: 'hdir', label: 'Kvalitetsindikatorer', type: 'up-right', dashed: true },
        { from: 'fhi', to: 'nhn', label: 'Kunnskapsinnhold', type: 'right' },
        { from: 'rhf', to: 'hdir', label: 'Tilbakemelding', type: 'up-left', dashed: true },
        { from: 'rhf', to: 'fhi', label: 'Klinisk validering', type: 'left', dashed: true },
        { from: 'nhn', to: 'innbygger', label: 'Helsenorge.no / chatbot', type: 'down' },
        { from: 'innbygger', to: 'hdir', label: 'Brukerinnspill', type: 'up-left', dashed: true },
        { from: 'ks', to: 'hdir', label: 'Etterlevelse', type: 'up-right', dashed: true },
        { from: 'hdir', to: 'ks', label: 'Overordnede rammer', type: 'down-left' },
    ];

    function getActor(id) { return actors.find(a => a.id === id); }

    function getConnPoint(actor, side) {
        const cx = actor.x + actor.w / 2;
        const cy = actor.y + actor.h / 2;
        switch(side) {
            case 'top': return { x: cx, y: actor.y };
            case 'bottom': return { x: cx, y: actor.y + actor.h };
            case 'left': return { x: actor.x, y: cy };
            case 'right': return { x: actor.x + actor.w, y: cy };
            default: return { x: cx, y: cy };
        }
    }

    function getSides(from, to) {
        const fcx = from.x + from.w/2, fcy = from.y + from.h/2;
        const tcx = to.x + to.w/2, tcy = to.y + to.h/2;
        const dx = tcx - fcx, dy = tcy - fcy;
        let fromSide, toSide;
        if (Math.abs(dy) > Math.abs(dx)) {
            fromSide = dy > 0 ? 'bottom' : 'top';
            toSide = dy > 0 ? 'top' : 'bottom';
        } else {
            fromSide = dx > 0 ? 'right' : 'left';
            toSide = dx > 0 ? 'left' : 'right';
        }
        return { fromSide, toSide };
    }

    function drawRoundedRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function drawArrowhead(ctx, toX, toY, fromX, fromY, size) {
        const angle = Math.atan2(toY - fromY, toX - fromX);
        ctx.beginPath();
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - size * Math.cos(angle - Math.PI/7), toY - size * Math.sin(angle - Math.PI/7));
        ctx.lineTo(toX - size * Math.cos(angle + Math.PI/7), toY - size * Math.sin(angle + Math.PI/7));
        ctx.closePath();
        ctx.fill();
    }

    function lighten(hex, amount) {
        let r = parseInt(hex.slice(1,3),16);
        let g = parseInt(hex.slice(3,5),16);
        let b = parseInt(hex.slice(5,7),16);
        r = Math.min(255, r + Math.round((255 - r) * amount));
        g = Math.min(255, g + Math.round((255 - g) * amount));
        b = Math.min(255, b + Math.round((255 - b) * amount));
        return `rgb(${r},${g},${b})`;
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Draw relations
        relations.forEach(rel => {
            const from = getActor(rel.from);
            const to = getActor(rel.to);
            const { fromSide, toSide } = getSides(from, to);
            const p1 = getConnPoint(from, fromSide);
            const p2 = getConnPoint(to, toSide);

            // Offset for parallel lines
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const len = Math.sqrt(dx*dx + dy*dy);
            const nx = -dy / len * 4, ny = dx / len * 4;
            const offset = rel.dashed ? 1 : -1;

            const sx = p1.x + nx * offset;
            const sy = p1.y + ny * offset;
            const ex = p2.x + nx * offset;
            const ey = p2.y + ny * offset;

            ctx.save();
            ctx.strokeStyle = rel.dashed ? '#888' : '#555';
            ctx.lineWidth = 1.5;
            ctx.fillStyle = ctx.strokeStyle;
            if (rel.dashed) ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(ex, ey);
            ctx.stroke();
            ctx.setLineDash([]);

            drawArrowhead(ctx, ex, ey, sx, sy, 9);

            // Label
            const mx = (sx + ex) / 2;
            const my = (sy + ey) / 2;
            const angle = Math.atan2(ey - sy, ex - sx);
            ctx.save();
            ctx.translate(mx, my);
            let rotAngle = angle;
            if (rotAngle > Math.PI/2) rotAngle -= Math.PI;
            if (rotAngle < -Math.PI/2) rotAngle += Math.PI;
            ctx.rotate(rotAngle);
            ctx.font = '10px system-ui';
            ctx.fillStyle = '#555';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText(rel.label, 0, -5);
            ctx.restore();
            ctx.restore();
        });

        // Draw actors
        actors.forEach(a => {
            // Shadow
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.12)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 3;
            drawRoundedRect(ctx, a.x, a.y, a.w, a.h, 10);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.restore();

            // Color header band
            const bandH = 36;
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(a.x + 10, a.y);
            ctx.lineTo(a.x + a.w - 10, a.y);
            ctx.quadraticCurveTo(a.x + a.w, a.y, a.x + a.w, a.y + 10);
            ctx.lineTo(a.x + a.w, a.y + bandH);
            ctx.lineTo(a.x, a.y + bandH);
            ctx.lineTo(a.x, a.y + 10);
            ctx.quadraticCurveTo(a.x, a.y, a.x + 10, a.y);
            ctx.closePath();
            ctx.fillStyle = a.color;
            ctx.fill();
            ctx.restore();

            // Border
            drawRoundedRect(ctx, a.x, a.y, a.w, a.h, 10);
            ctx.strokeStyle = a.color;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Label text
            ctx.font = 'bold 14px system-ui';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(a.label, a.x + a.w/2, a.y + bandH/2);

            // Subtitle
            ctx.font = '11.5px system-ui';
            ctx.fillStyle = '#333';
            ctx.fillText(a.subtitle, a.x + a.w/2, a.y + bandH + 18);

            // Bullets preview
            ctx.font = '10px system-ui';
            ctx.fillStyle = '#666';
            const maxBullets = 2;
            for (let i = 0; i < Math.min(a.bullets.length, maxBullets); i++) {
                let text = a.bullets[i];
                if (text.length > 30) text = text.slice(0, 28) + '...';
                ctx.fillText(text, a.x + a.w/2, a.y + bandH + 36 + i * 14);
            }
            if (a.bullets.length > maxBullets) {
                ctx.fillStyle = '#999';
                ctx.fillText('+ ' + (a.bullets.length - maxBullets) + ' til...', a.x + a.w/2, a.y + bandH + 36 + maxBullets * 14);
            }
        });
    }

    draw();

    // Tooltip
    const tooltip = document.getElementById('tooltip');
    canvas.addEventListener('mousemove', function(e) {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        let found = null;
        for (const a of actors) {
            if (mx >= a.x && mx <= a.x + a.w && my >= a.y && my <= a.y + a.h) {
                found = a;
                break;
            }
        }
        if (found) {
            canvas.style.cursor = 'pointer';
            let html = '<strong>' + found.label + '</strong> - ' + found.subtitle + '<br><br>';
            found.bullets.forEach(b => { html += '&bull; ' + b + '<br>'; });
            html += '<br><em>' + found.tooltip + '</em>';
            tooltip.innerHTML = html;
            tooltip.style.opacity = '1';
            let tx = e.clientX + 16;
            let ty = e.clientY + 16;
            if (tx + 300 > window.innerWidth) tx = e.clientX - 316;
            if (ty + 200 > window.innerHeight) ty = e.clientY - 200;
            tooltip.style.left = tx + 'px';
            tooltip.style.top = ty + 'px';
        } else {
            canvas.style.cursor = 'default';
            tooltip.style.opacity = '0';
        }
    });
    canvas.addEventListener('mouseleave', function() {
        tooltip.style.opacity = '0';
    });
})();
</script>
</body>
</html>
