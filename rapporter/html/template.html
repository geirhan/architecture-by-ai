<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #333;
      background: #fff;
      line-height: 1.7;
    }

    /* Header */
    header {
      background: #003366;
      color: #fff;
      padding: 2rem 1rem 1rem;
      text-align: center;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    header p {
      font-size: 0.95rem;
      opacity: 0.85;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Navigation */
    nav {
      background: #002244;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
    }
    nav ul {
      list-style: none;
      display: flex;
      max-width: 900px;
      margin: 0 auto;
      padding: 0;
      flex-wrap: wrap;
    }
    nav li {
      flex-shrink: 0;
    }
    nav a {
      display: block;
      color: #ccd9e6;
      text-decoration: none;
      padding: 0.65rem 1rem;
      font-size: 0.85rem;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    nav a:hover {
      color: #fff;
      border-bottom-color: #6699cc;
    }
    nav a.active {
      color: #fff;
      border-bottom-color: #fff;
      font-weight: 600;
    }

    /* Main */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }

    h1 { color: #003366; font-size: 1.5rem; margin: 2rem 0 1rem; }
    h2 {
      color: #003366;
      font-size: 1.35rem;
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.3rem;
      border-bottom: 2px solid #e0e7ee;
    }
    h2:first-child { margin-top: 0; }
    h3 { color: #003366; font-size: 1.05rem; margin: 1.5rem 0 0.5rem; }
    h4 { color: #003366; font-size: 0.95rem; margin: 1.2rem 0 0.4rem; }

    p, li { margin-bottom: 0.5rem; }

    a { color: #005599; }
    a:hover { color: #003366; }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9rem;
    }
    th, td {
      text-align: left;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid #dde3ea;
    }
    thead th {
      background: #f0f3f7;
      color: #003366;
      font-weight: 600;
    }
    tbody tr:hover {
      background: #f9fafb;
    }

    /* Table overflow wrapper (pandoc wraps tables) */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Blockquotes */
    blockquote {
      background: #f0f4f8;
      border-left: 4px solid #003366;
      padding: 1rem 1.5rem;
      margin: 1rem 0;
      border-radius: 0 4px 4px 0;
      color: #333;
    }
    blockquote p { margin-bottom: 0.3rem; }
    blockquote p:last-child { margin-bottom: 0; }

    /* Code */
    code {
      background: #f0f3f7;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.9em;
    }
    pre {
      background: #f0f3f7;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      margin: 1rem 0;
    }
    pre code {
      background: none;
      padding: 0;
    }

    /* Lists */
    ul, ol {
      padding-left: 1.5rem;
      margin: 0.5rem 0;
    }

    /* Horizontal rules */
    hr {
      border: none;
      border-top: 2px solid #e0e7ee;
      margin: 2rem 0;
    }

    /* Strong in lists (used for actor descriptions) */
    li strong {
      color: #003366;
    }

    /* Footer */
    footer {
      background: #f0f3f7;
      color: #555;
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.85rem;
      border-top: 1px solid #dde3ea;
    }

    /* Print */
    @media print {
      nav { display: none; }
      header { background: #fff; color: #003366; border-bottom: 2px solid #003366; }
      main { padding: 0; }
      footer { background: #fff; border-top: 1px solid #333; }
      a { color: #003366; }
    }
  </style>
</head>
<body>

<header>
  <h1>$title$</h1>
  <p>$subtitle$</p>
</header>

$nav$

<main>
$body$
</main>

<footer>
  Utredning gjennomført av Helsedirektoratet, 2026
</footer>

</body>
</html>
